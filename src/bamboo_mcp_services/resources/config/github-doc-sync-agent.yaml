# github-doc-sync-agent configuration
#
# How often to check GitHub for changes (seconds).  One hour is a reasonable
# default for documentation repositories.
refresh_interval_s: 3600

# How often the run loop calls tick() (seconds).  The interval gate in the
# syncer means most ticks are instant no-ops.
tick_interval_s: 60.0

# List of GitHub repositories to monitor.
# Each entry must have at minimum 'name' and 'destination'.
#
# 'name' is the GitHub owner/repo identifier — the part of the URL after
# github.com/.  For example, https://github.com/PanDAWMS/panda-docs becomes
# name: PanDAWMS/panda-docs
#
# Example:
#
# repos:
#   - name: PanDAWMS/panda-docs
#     destination: ./data/panda-docs/raw
#     normalized_destination: ./data/panda-docs/normalized
#     within_hours: 168
#     branch: main
#     include_patterns:
#       - "*.md"
#       - "*.rst"
#     normalize_for_rag: true
#
# Set GITHUB_TOKEN in the environment to access private repositories or to
# raise the GitHub API rate limit from 60 to 5000 requests/hour.

repos:
